<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Buurtwerkzaamheden van De Buurtwacht toont werkzaamheden, verkeershinder en gemeentelijke bekendmakingen voor Maassluis." />
    <title>Buurtwerkzaamheden - De Buurtwacht</title>
    <link rel="stylesheet" href="styles.css?v=20260617-clean-1" />
    <link rel="stylesheet" href="clean-ui.css?v=20260617-clean-1" />
    <link rel="stylesheet" href="app-theme.css?v=20260617-app-1" />
    <link rel="stylesheet" href="works.css?v=20260617-works-4" />
  </head>
  <body data-page="buurtwerkzaamheden">
    <header class="app-header">
      <nav class="appbar" aria-label="Hoofdnavigatie">
        <a class="wordmark" href="index.html" aria-label="De Buurtwacht startpagina">
          <span class="wordmark-de">De</span>
          <span class="wordmark-name">Buurtwacht</span>
        </a>
        <a class="location-pill work-location-pill" href="mijnbuurt.html" aria-label="Mijn buurt instellen">
          <span class="location-dot work-location-dot"></span>
          Maassluis
        </a>
      </nav>
    </header>

    <main>
      <section class="works-shell page-width">
        <section class="works-hero works-hero-simple" aria-labelledby="works-title">
          <div class="works-hero-copy">
            <p class="eyebrow dark">BuurtWerkzaamheden</p>
            <h1 id="works-title">Werkzaamheden in Maassluis</h1>
            <p>Werk, verkeer en bekendmakingen dichtbij.</p>
          </div>
        </section>

        <section class="works-tools" aria-label="Werkzaamheden zoeken en filteren">
          <label class="works-search">
            <span class="works-search-icon" aria-hidden="true"></span>
            <input id="worksSearch" type="search" placeholder="Zoek op straat, wijk of onderwerp" autocomplete="off" />
          </label>
          <div class="works-filter-row" role="list" aria-label="Werkzaamhedenfilters">
            <button class="works-filter active" type="button" data-filter="all">Alles</button>
            <button class="works-filter" type="button" data-filter="werkzaamheden">Werkzaamheden</button>
            <button class="works-filter" type="button" data-filter="bekendmakingen">Bekendmakingen</button>
          </div>
        </section>

        <section class="works-feed-section" aria-labelledby="works-feed-title">
          <div class="section-title-row works-section-title">
            <div>
              <span class="small-label">Laatste berichten</span>
              <h2 id="works-feed-title">Actueel in je buurt</h2>
            </div>
            <button id="refreshWorks" type="button" class="works-refresh">Ververs</button>
          </div>

          <div id="worksList" class="works-list" aria-live="polite">
            <article class="works-item skeleton-works"><div><span></span><strong></strong><p></p></div></article>
            <article class="works-item skeleton-works"><div><span></span><strong></strong><p></p></div></article>
            <article class="works-item skeleton-works"><div><span></span><strong></strong><p></p></div></article>
          </div>
          <nav id="worksPagination" class="works-pagination" aria-label="Pagina's met werkzaamheden"></nav>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="Hoofdmenu">
      <a href="mijnbuurt.html" data-page="mijnbuurt" aria-label="Mijn buurt"><span class="nav-icon icon-house" aria-hidden="true"></span><span>Buurt</span></a>
      <a href="buurtnieuws.html" data-page="buurtnieuws" aria-label="Buurtnieuws"><span class="nav-icon icon-news" aria-hidden="true"></span><span>Nieuws</span></a>
      <a href="buurtmeldingen.html" data-page="buurtmeldingen" aria-label="Buurtmeldingen"><span class="nav-icon icon-bell" aria-hidden="true"></span><span>Meldingen</span></a>
      <a href="buurtweer.html" data-page="buurtweer" aria-label="Buurtweer"><span class="nav-icon icon-weather" aria-hidden="true"></span><span>Weer</span></a>
      <a href="buurtwerkzaamheden.html" data-page="buurtwerkzaamheden" aria-label="Werkzaamheden"><span class="nav-icon icon-work" aria-hidden="true"></span><span>Werk</span></a>
      <a href="buurttips.html" data-page="buurttips" aria-label="Buurttips"><span class="nav-icon icon-tip" aria-hidden="true"></span><span>Tips</span></a>
    </nav>

    <script src="app.js?v=20260617-clean-1"></script>
    <script src="works.js?v=20260617-page-2"></script>
    <script src="clean-copy.js?v=20260617-no-live-1"></script>
  </body>
</html>
